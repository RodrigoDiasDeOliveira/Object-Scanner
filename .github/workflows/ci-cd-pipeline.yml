name: Python-Android CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ==================== BACKEND PYTHON ====================
  python-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev libaio1

      - name: Install Python Dependencies
        working-directory: ./PythonBackend
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run Python Tests
        working-directory: ./PythonBackend
        run: |
          pytest -v --cov=. --cov-report=xml


  # ==================== ANDROID APP ====================
  android-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./Android/gradlew

      - name: Update Gradle Wrapper to 8.9 (if needed)
        working-directory: ./Android
        run: |
          sed -i 's/gradle-.*-all.zip/gradle-8.9-all.zip/' gradle/wrapper/gradle-wrapper.properties || true

      - name: Build Android App (Debug APK)
        working-directory: ./Android
        run: ./gradlew assembleDebug --stacktrace

      - name: Run Android Unit Tests
        working-directory: ./Android
        run: ./gradlew test --stacktrace

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk


  # ==================== DEPLOY (Opcional) ====================
  deploy:
    runs-on: ubuntu-latest
    needs: [python-backend, android-app]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend (Exemplo)
        run: |
          echo "Deploy do backend Python seria feito aqui (ex: Azure, Render, Railway, etc.)"

      - name: Upload Android APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-final-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
  

