name: Python-Android CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  python-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libaio-dev  # Alterado de libaio1

      - name: Install Python Dependencies
        working-directory: ./PythonBackend
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run Python Tests
        working-directory: ./PythonBackend
        run: |
          pytest -v || echo "⚠️ pytest falhou ou não há testes configurados ainda"


  android-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: |
          if [ -f ./Android/gradlew ]; then
            chmod +x ./Android/gradlew
            echo "✅ gradlew encontrado"
          else
            echo "❌ gradlew não encontrado!"
            ls -la ./Android/
            exit 1
          fi

      - name: Force Gradle 8.9
        working-directory: ./Android
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's/gradle-[0-9.]\+-all.zip/gradle-8.9-all.zip/g' gradle/wrapper/gradle-wrapper.properties
            echo "✅ Gradle atualizado para versão 8.9"
            cat gradle/wrapper/gradle-wrapper.properties
          else
            echo "⚠️ gradle-wrapper.properties não encontrado"
          fi

      - name: Build Android Debug APK
        working-directory: ./Android
        run: ./gradlew assembleDebug --stacktrace

      - name: Run Android Unit Tests
        working-directory: ./Android
        run: ./gradlew test --stacktrace || echo "⚠️ Testes Android falharam"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
