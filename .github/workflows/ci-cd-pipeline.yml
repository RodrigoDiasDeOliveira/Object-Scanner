name: Python-Android CI/CD Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]


jobs:

  python-backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./PythonBackend

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

          cache: 'pip'


      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libaio-dev


      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt


      - name: Validate Ultralytics Installation
        run: |
          python -c "from ultralytics import YOLO; print('YOLO OK')"


      - name: Run Python Tests
        run: |
          pytest -v || echo "⚠️ No tests configured"


  android-app:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout Code
        uses:
          actions/checkout@v4


      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'


      - name: Grant execute permission for gradlew
        working-directory: ./Android
        run: |
          chmod +x gradlew


      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('Android','**/gradle-wrapper.properties') }}


      - name: Build Android Debug APK
        working-directory: ./Android
        run: |
          ./gradlew assembleDebug --stacktrace


      - name: Run Android Tests
        working-directory: ./Android
        run: |
          ./gradlew test --stacktrace || echo "⚠️ Tests pending"


      - name: Upload APK
        if: success()

        uses: actions/upload-artifact@v4

        with:

          name: object-scanner-debug-apk

          path: Android/app/build/outputs/apk/debug/app-debug.apk